# Lines ending with `# [hidden]` won't be shown on cheatsheet
# Lines starting with #! are section headings

# DO NOT REMOVE THIS EXEC OR YOU WON'T BE ABLE TO USE ANY KEYBIND
exec = hyprctl dispatch submap global
# This is required for catchall to work
submap = global

#!
##! Shell
# Default
bind = Super, D, exec, rofi -run-list-command "$HOME/.config/rofi/rofi-list $HOME/.bin" -run-command "/bin/bash -i -c '{cmd}'" -rnow -show run # Rofi Launcher
bind = Super, A, global, quickshell:sidebarLeftToggle # Toggle left sidebar
bindd = Super, N, Toggle right sidebar, global, quickshell:sidebarRightToggle # Toggle right sidebar
bindd = Super, M, Toggle media controls, global, quickshell:mediaControlsToggle # Toggle media controls
bind = Super, G, global, quickshell:overlayToggle # Toggle overlay
bindd = Super, B, Toggle bar, global, quickshell:barToggle # Toggle bar
bindd = Super, Delete, Toggle session menu, global, quickshell:sessionToggle # Toggle session menu

bindd = Super, Slash, Toggle cheatsheet, global, quickshell:cheatsheetToggle # Toggle cheatsheet
bind = Ctrl, Space, global, quickshell:notificationsDismissAll # Timeout all notification popups
bind = Ctrl+Shift, Space, global, quickshell:notificationsDiscardAll # Discard all notification

bindle=, XF86MonBrightnessUp, exec, qs -c $qsConfig ipc call brightness increment || brightnessctl s 5%+ # [hidden]
bindle=, XF86MonBrightnessDown, exec, qs -c $qsConfig ipc call brightness decrement || brightnessctl s 5%- # [hidden]
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+ -l 1.5# [hidden]
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- # [hidden]

bindl = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # [hidden]
bindld = Super+Shift,M, Toggle mute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # [hidden]
bindl = Alt ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]
bindl = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]
bindld = Ctrl+Shift,X, Toggle mic, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]
bind = Ctrl+Super, R, exec, killall ydotool qs quickshell; qs -c $qsConfig & # Restart widgets

#!
##! Window
# Window Focus
bind = Super, h, movefocus, l # [hidden]
bind = Super, l, movefocus, r # [hidden]
bind = Super, k, movefocus, u # [hidden]
bind = Super, j, movefocus, d # [hidden]
bind = Super+Shift, h, movewindow, l # [hidden]
bind = Super+Shift, l, movewindow, r # [hidden]
bind = Super+Shift, k, movewindow, u # [hidden]
bind = Super+Shift, j, movewindow, d # [hidden]
bind = Super+Shift, Q, killactive, # Close
bind = Super+Shift+Alt, Q, exec, hyprctl kill # Forcefully zap a window

bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow

binde = Super+Alt, h, layoutmsg, splitratio -0.1 # [hidden]
binde = Super+Alt, l, layoutmsg, splitratio +0.1 # [hidden]
bind = Super+Shift, Space, togglefloating, # Float/Tile
bind = Super, F, fullscreen, 1 # Maximize
bind = Super+Shift, F, fullscreen, 0 # Fullscreen

##! Workspace
#/# bind = Super+Alt, Hash,, # Send to workspace # (1, 2, 3,...)
# We use raw keycodes because some keyboard layouts register number keys as different chars. The codes can be verified with `wev`
bind = Super+Shift, code:10, exec, hyprctl dispatch movetoworkspacesilent 1 # [hidden]
bind = Super+Shift, code:11, exec, hyprctl dispatch movetoworkspacesilent 2 # [hidden]
bind = Super+Shift, code:12, exec, hyprctl dispatch movetoworkspacesilent 3 # [hidden]
bind = Super+Shift, code:13, exec, hyprctl dispatch movetoworkspacesilent 4 # [hidden]
bind = Super+Shift, code:14, exec, hyprctl dispatch movetoworkspacesilent 5 # [hidden]
bind = Super+Shift, code:15, exec, hyprctl dispatch movetoworkspacesilent 6 # [hidden]
bind = Super+Shift, code:16, exec, hyprctl dispatch movetoworkspacesilent 7 # [hidden]
bind = Super+Shift, code:17, exec, hyprctl dispatch movetoworkspacesilent 8 # [hidden]
bind = Super+Shift, code:18, exec, hyprctl dispatch movetoworkspacesilent 9 # [hidden]
bind = Super+Shift, code:19, exec, hyprctl dispatch movetoworkspacesilent 10 # [hidden]

bind = Super, code:10, exec, hyprctl dispatch workspace 1 # [hidden]
bind = Super, code:11, exec, hyprctl dispatch workspace 2 # [hidden]
bind = Super, code:12, exec, hyprctl dispatch workspace 3 # [hidden]
bind = Super, code:13, exec, hyprctl dispatch workspace 4 # [hidden]
bind = Super, code:14, exec, hyprctl dispatch workspace 5 # [hidden]
bind = Super, code:15, exec, hyprctl dispatch workspace 6 # [hidden]
bind = Super, code:16, exec, hyprctl dispatch workspace 7 # [hidden]
bind = Super, code:17, exec, hyprctl dispatch workspace 8 # [hidden]
bind = Super, code:18, exec, hyprctl dispatch workspace 9 # [hidden]
bind = Super, code:19, exec, hyprctl dispatch workspace 10 # [hidden]

#!
##! Session
bindd = Super, X, Lock, exec, loginctl lock-session # Lock
bindld = Super+Shift, X, Suspend system, exec, systemctl suspend || loginctl suspend # Sleep

##! Media
bindl= Super+Shift, N, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # Next track
bindl= ,XF86AudioNext, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # [hidden]
bindl= ,XF86AudioPrev, exec, playerctl previous # [hidden]
bind = Super+Shift+Alt, mouse:275, exec, playerctl previous # [hidden]
bind = Super+Shift+Alt, mouse:276, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # [hidden]
bindl= Super+Shift, B, exec, playerctl previous # Previous track
bindl= Super+Shift, P, exec, playerctl play-pause # Play/pause media
bindl= ,XF86AudioPlay, exec, playerctl play-pause # [hidden]
bindl= ,XF86AudioPause, exec, playerctl play-pause # [hidden]

##! Utilities
bind = Super+Shift, S, global, quickshell:regionScreenshot # Screen snip
bindd = Super+Shift, C, Color picker, exec, hyprpicker -a # Pick color (Hex) >> clipboard

##! Apps
bind = Super, Return, exec, $terminal # Terminal
bind = Super, E, exec, $fileManager # File manager
bind = Ctrl+Super, V, exec, $volumeMixer # Volume mixer
bind = Super, S, exec, $settingsApp # Settings app
bind = Ctrl+Shift, Escape, exec, $taskManager # Task manager

